components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AuthSession:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # TENANT
    Tenant:
      type: object
      required: [id, name, slug, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: ["string", "null"]
        defaultSenderId:
          type: ["string", "null"]
        timezone:
          type: string
        smsRatePerMessage:
          type: number
        walletBalance:
          type: number
        createdAt:
          type: string

    TenantInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        timezone:
          type: string
        smsRatePerMessage:
          type: number

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        timezone:
          type: string
        smsRatePerMessage:
          type: number
        defaultSenderId:
          type: ["string", "null"]
        primaryColor:
          type: ["string", "null"]

    TenantSettings:
      type: object
      required: [id, tenantId, defaultSenderId, timezone, smsRatePerMessage]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        defaultSenderId:
          type: ["string", "null"]
        timezone:
          type: string
        smsRatePerMessage:
          type: number
        allowFieldAgentVillageSubmission:
          type: boolean
        requireConsentForSms:
          type: boolean

    TenantSettingsUpdate:
      type: object
      properties:
        defaultSenderId:
          type: ["string", "null"]
        timezone:
          type: string
        allowFieldAgentVillageSubmission:
          type: boolean
        requireConsentForSms:
          type: boolean

    # USER
    User:
      type: object
      required: [id, email, firstName, lastName, role, isActive, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [super_admin, tenant_admin, county_coordinator, constituency_coordinator, ward_coordinator, village_coordinator, field_agent]
        isActive:
          type: boolean
        tenantId:
          type: ["integer", "null"]
        assignedCountyId:
          type: ["integer", "null"]
        assignedConstituencyId:
          type: ["integer", "null"]
        assignedWardId:
          type: ["integer", "null"]
        assignedVillageId:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, firstName, lastName, role, password]
      properties:
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [tenant_admin, county_coordinator, constituency_coordinator, ward_coordinator, village_coordinator, field_agent]
        password:
          type: string
        assignedCountyId:
          type: ["integer", "null"]
        assignedConstituencyId:
          type: ["integer", "null"]
        assignedWardId:
          type: ["integer", "null"]
        assignedVillageId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        assignedCountyId:
          type: ["integer", "null"]
        assignedConstituencyId:
          type: ["integer", "null"]
        assignedWardId:
          type: ["integer", "null"]
        assignedVillageId:
          type: ["integer", "null"]

    # GEOGRAPHY
    County:
      type: object
      required: [id, name, code]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        constituencyCount:
          type: integer

    Constituency:
      type: object
      required: [id, name, countyId]
      properties:
        id:
          type: integer
        name:
          type: string
        countyId:
          type: integer
        countyName:
          type: string
        wardCount:
          type: integer

    Ward:
      type: object
      required: [id, name, constituencyId]
      properties:
        id:
          type: integer
        name:
          type: string
        constituencyId:
          type: integer
        constituencyName:
          type: string
        countyName:
          type: string

    Village:
      type: object
      required: [id, name, wardId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        wardId:
          type: integer
        wardName:
          type: string
        status:
          type: string
          enum: [active, pending, rejected]
        gpsCoordinates:
          type: ["string", "null"]
        population:
          type: ["integer", "null"]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string

    VillageInput:
      type: object
      required: [name, wardId]
      properties:
        name:
          type: string
        wardId:
          type: integer
        gpsCoordinates:
          type: string
        population:
          type: integer

    VillageUpdate:
      type: object
      properties:
        name:
          type: string
        gpsCoordinates:
          type: ["string", "null"]
        population:
          type: ["integer", "null"]

    VillageRejection:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    PollingStation:
      type: object
      required: [id, name, wardId, code, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        wardId:
          type: integer
        wardName:
          type: string
        villageId:
          type: ["integer", "null"]
        registeredVoters:
          type: ["integer", "null"]
        createdAt:
          type: string

    PollingStationInput:
      type: object
      required: [name, code, wardId]
      properties:
        name:
          type: string
        code:
          type: string
        wardId:
          type: integer
        villageId:
          type: ["integer", "null"]
        registeredVoters:
          type: ["integer", "null"]

    PollingStationUpdate:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        villageId:
          type: ["integer", "null"]
        registeredVoters:
          type: ["integer", "null"]

    # CONTACTS
    Contact:
      type: object
      required: [id, firstName, lastName, phone, tenantId, createdAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        gender:
          type: ["string", "null"]
          enum: [male, female, other, null]
        ageGroup:
          type: ["string", "null"]
        occupation:
          type: ["string", "null"]
        countyId:
          type: ["integer", "null"]
        constituencyId:
          type: ["integer", "null"]
        wardId:
          type: ["integer", "null"]
        villageId:
          type: ["integer", "null"]
        pollingStationId:
          type: ["integer", "null"]
        wardName:
          type: ["string", "null"]
        villageName:
          type: ["string", "null"]
        consentSms:
          type: boolean
        consentSource:
          type: ["string", "null"]
        consentDate:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        tenantId:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [firstName, lastName, phone]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        ageGroup:
          type: string
        occupation:
          type: string
        countyId:
          type: ["integer", "null"]
        constituencyId:
          type: ["integer", "null"]
        wardId:
          type: ["integer", "null"]
        villageId:
          type: ["integer", "null"]
        pollingStationId:
          type: ["integer", "null"]
        consentSms:
          type: boolean
        consentSource:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    ContactUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        gender:
          type: ["string", "null"]
        ageGroup:
          type: ["string", "null"]
        occupation:
          type: ["string", "null"]
        wardId:
          type: ["integer", "null"]
        villageId:
          type: ["integer", "null"]
        pollingStationId:
          type: ["integer", "null"]
        consentSms:
          type: boolean
        tags:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]

    ContactsPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DuplicateContactResponse:
      type: object
      required: [error, existing]
      properties:
        error:
          type: string
        existing:
          $ref: "#/components/schemas/Contact"

    ContactImportInput:
      type: object
      required: [contacts]
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/ContactInput"

    ImportResult:
      type: object
      required: [imported, skipped, errors]
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    ContactStats:
      type: object
      properties:
        total:
          type: integer
        withConsent:
          type: integer
        byGender:
          type: array
          items:
            $ref: "#/components/schemas/StatBucket"
        byConstituency:
          type: array
          items:
            $ref: "#/components/schemas/StatBucket"
        recentlyAdded:
          type: integer

    StatBucket:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    # GROUPS
    Group:
      type: object
      required: [id, name, tenantId, memberCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        tenantId:
          type: integer
        memberCount:
          type: integer
        createdAt:
          type: string

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]

    GroupMembersInput:
      type: object
      required: [contactIds]
      properties:
        contactIds:
          type: array
          items:
            type: integer

    # TEMPLATES
    Template:
      type: object
      required: [id, name, body, tenantId, isArchived, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        body:
          type: string
        charCount:
          type: integer
        partCount:
          type: integer
        tenantId:
          type: integer
        isArchived:
          type: boolean
        createdAt:
          type: string

    TemplateInput:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
        body:
          type: string

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
        body:
          type: string

    # CAMPAIGNS
    Campaign:
      type: object
      required: [id, name, senderId, body, status, tenantId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        senderId:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [draft, queued, sending, completed, paused, failed]
        tenantId:
          type: integer
        templateId:
          type: ["integer", "null"]
        scheduledAt:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        totalRecipients:
          type: integer
        sentCount:
          type: integer
        deliveredCount:
          type: integer
        failedCount:
          type: integer
        estimatedCost:
          type: number
        actualCost:
          type: number
        audienceFilter:
          $ref: "#/components/schemas/AudienceFilter"
        createdAt:
          type: string

    CampaignInput:
      type: object
      required: [name, senderId, body, audience]
      properties:
        name:
          type: string
        senderId:
          type: string
        body:
          type: string
        templateId:
          type: ["integer", "null"]
        audience:
          $ref: "#/components/schemas/AudienceFilter"
        scheduledAt:
          type: ["string", "null"]
        sendNow:
          type: boolean

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
        senderId:
          type: string
        body:
          type: string
        audience:
          $ref: "#/components/schemas/AudienceFilter"
        scheduledAt:
          type: ["string", "null"]

    AudienceFilter:
      type: object
      properties:
        countyIds:
          type: array
          items:
            type: integer
        constituencyIds:
          type: array
          items:
            type: integer
        wardIds:
          type: array
          items:
